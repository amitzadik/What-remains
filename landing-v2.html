<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>מה שישאר — עמוד הבית</title>
  <link rel="stylesheet" href="style.css?v=14">
  <link rel="stylesheet" href="landing-v2.css?v=9">
</head>
<body>
  <main class="landing-v2" id="landing-v2">
    <div class="landing-v2__wordmark" aria-hidden="true">מה שישאר</div>

    <div class="landing-v2__corner landing-v2__corner--top" aria-hidden="true">
      <span class="corner-layer corner-layer--a"><img src="images/figma-paper-photo.jpg" alt=""></span>
      <span class="corner-layer corner-layer--b"><img src="images/figma-photo-wide.png" alt=""></span>
      <span class="corner-layer corner-layer--c"><img src="images/figma-photo-family.png" alt=""></span>
      <span class="corner-layer corner-layer--d"><img src="images/figma-photo-portrait.png" alt=""></span>
    </div>

    <nav class="landing-v2__nav" aria-label="פעולות">
      <button class="icon-btn" type="button" aria-label="התחברות"><img src="images/login-default.png" alt=""></button>
      <button class="icon-btn" type="button" aria-label="המגירה שלי"><img src="images/my-drawer-default.png" alt=""></button>
      <button class="icon-btn" type="button" aria-label="חיפוש"><img src="images/search-default.png" alt=""></button>
    </nav>

    <section class="landing-v2__copy landing-card-face landing-card-front" aria-label="פתיח">
      <div class="landing-body">
        <p class="landing-v2__title">כאן נאספים הדברים שנבחר להשאיר אחרינו.</p>
        <p>מילים, זכרונות, תמונות ועדויות<br>שנועדו להגיע אל מי שיבואו אחרינו.</p>
        <p>באפשרותכם לעיין במה שנשמר עבורכם,<br>או להוסיף שכבה חדשה משלכם.</p>
        <p>כל ארכיון אישי נשמר תחת קוד גישה<br>ייחודי, שיאפשר לכם לשוב אליו בעתיד.</p>
      </div>
    </section>

    <button class="landing-v2__pile" id="landing-v2-add" type="button" aria-label="צור את האוסף שלך">
      <span class="pile-photo pile-photo--1"></span>
      <span class="pile-photo pile-photo--2"></span>
      <span class="pile-photo pile-photo--3"></span>
      <span class="pile-photo pile-photo--4"></span>
      <span class="pile-sheet pile-sheet--back"></span>
      <span class="pile-sheet pile-sheet--middle"></span>
      <span class="pile-sheet pile-sheet--front">
        <span class="pile-plus"><img src="images/add-new-default.png" alt=""></span>
        <span class="pile-label">צור את האוסף שלך</span>
      </span>
    </button>
  </main>
  <script src="landing-v2.js?v=4"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ארכיון הזיכרון</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body dir="rtl">
  <main class="stage">
    <article class="q-card" aria-labelledby="q-text">

      <div class="q-header-row">
        <div class="q-cell q-cell-name">
          <span class="q-label">שם העונה</span>
          <span class="q-value" id="q-name"></span>
        </div>
        <div class="q-cell q-cell-date">
          <span class="q-label">תאריך</span>
          <span class="q-value" id="q-date"></span>
        </div>
        <div class="q-cell q-cell-num">
          <span class="q-label">מס׳ שאלה</span>
          <span class="q-value large red-text" id="q-num">1/7</span>
        </div>
      </div>

      <div class="q-question-row">
        <span class="q-label">שאלה</span>
        <div class="q-question-text" id="q-text"></div>
      </div>

      <div class="q-answer-row">
        <span class="q-label">תשובה</span>
        <div class="q-ruled-area" id="lines">
          <div class="line"><span class="line__text" contenteditable="true" spellcheck="true" data-line="0"></span></div>
          <div class="line"><span class="line__text" contenteditable="true" spellcheck="true" data-line="1"></span></div>
          <div class="line"><span class="line__text" contenteditable="true" spellcheck="true" data-line="2"></span></div>
          <div class="line"><span class="line__text" contenteditable="true" spellcheck="true" data-line="3"></span></div>
          <div class="line"><span class="line__text" contenteditable="true" spellcheck="true" data-line="4"></span></div>
          <div class="line"><span class="line__text" contenteditable="true" spellcheck="true" data-line="5"></span></div>
          <div class="line"><span class="line__text" contenteditable="true" spellcheck="true" data-line="6"></span></div>
        </div>
      </div>

      <div class="q-footer-row">
        <div class="q-cell">
          <button id="btn-dk-q" type="button" class="q-btn red-text">לא יודע/ת</button>
        </div>
        <div class="q-cell">
          <button id="btn-next-q" type="button" class="q-btn" disabled>לשאלה הבאה</button>
        </div>
      </div>

    </article>
  </main>

  <script src="script.js"></script>
</body>
</html>

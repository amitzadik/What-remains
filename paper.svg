<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" preserveAspectRatio="none">
  <defs>
    <filter id="fibers" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="3" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.55
                             0 0 0 0 0.45
                             0 0 0 0 0.30
                             0 0 0 0.10 0"/>
    </filter>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" seed="7" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.80
                             0 0 0 0 0.72
                             0 0 0 0 0.55
                             0 0 0 0.07 0"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#FAF6EE"/>
  <rect width="100%" height="100%" filter="url(#grain)"/>
  <rect width="100%" height="100%" filter="url(#fibers)"/>
</svg>
